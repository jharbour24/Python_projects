# Public Signals Configuration
#
# Configure Broadway shows for public demand proxy collection
#
# ⚡ MINIMAL CONFIGURATION (RECOMMENDED)
# Just provide show names - everything else is auto-detected:
#
# shows:
#   - name: "Oh, Mary!"
#   - name: "Maybe Happy Ending"
#   - name: "Hamilton"
#
# The system will automatically:
#   ✓ Generate Google Trends queries: "[Show] Broadway", "[Show] musical", etc.
#   ✓ Detect Wikipedia article titles: Tries multiple variants
#   ✓ Skip social media gracefully if handles not provided
#
# ------------------------------------------------------------------------------
#
# OPTIONAL FIELDS (for fine-tuning):
#   - google_queries: Custom search queries for Google Trends
#   - wikipedia_title: Exact Wikipedia article title (if auto-detection fails)
#   - tiktok_handle: TikTok handle (with or without @)
#   - instagram_handle: Instagram handle (without @)
#
# ------------------------------------------------------------------------------

shows:
  # MINIMAL CONFIG - Just show names (recommended approach)
  - name: "Oh, Mary!"
  - name: "Maybe Happy Ending"
  - name: "Hamilton"
  - name: "The Outsiders"
  - name: "Wicked"
  - name: "The Lion King"

  # ADVANCED CONFIG - With social media handles
  # Uncomment and customize as needed:
  #
  # - name: "Oh, Mary!"
  #   tiktok_handle: "@ohmaryplay"
  #   instagram_handle: "ohmaryplay"
  #
  # - name: "Maybe Happy Ending"
  #   tiktok_handle: "@maybehappyending"
  #   instagram_handle: "maybehappyendingmusical"
  #
  # EXPERT CONFIG - Full customization
  # Use only if auto-detection fails:
  #
  # - name: "Oh, Mary!"
  #   google_queries:
  #     - "Oh Mary Broadway"
  #     - "Cole Escola"
  #   wikipedia_title: "Oh,_Mary!"
  #   tiktok_handle: "@ohmaryplay"
  #   instagram_handle: "ohmaryplay"

# Notes:
# 1. Google Trends queries should be specific to avoid noise
# 2. Wikipedia titles use underscores and may have disambiguation suffixes like "_(musical)"
# 3. TikTok handles can include @ or not - both work
# 4. Instagram handles should not include @
# 5. Social media handles are optional - collector will skip if not provided
